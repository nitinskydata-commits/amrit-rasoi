version: '3.8'

services:
  # 🌐 Nginx Load Balancer
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-api-1
      - backend-api-2
    networks:
      - sbmi-net
    restart: always

  # ⚙️ Primary Express API Server (Node 1)
  backend-api-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://db-primary:27017/amrit-rasoi?replicaSet=rs0
      - REDIS_URL=redis://redis-cache:6379
      - PORT=5000
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - sbmi-net
    restart: always

  # ⚙️ Secondary Express API Server (Node 2)
  backend-api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://db-primary:27017/amrit-rasoi?replicaSet=rs0
      - REDIS_URL=redis://redis-cache:6379
      - PORT=5000
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    networks:
      - sbmi-net
    restart: always

  # 📥 Background Task Queue Worker Node
  background-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node utils/queue.js
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://db-primary:27017/amrit-rasoi?replicaSet=rs0
      - REDIS_URL=redis://redis-cache:6379
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - sbmi-net
    restart: always

  # ⚡ Redis Cache & Message Broker Node
  redis-cache:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sbmi-net
    restart: always

  # 🍃 MongoDB Primary Replica Instance
  db-primary:
    image: mongo:6
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo-data-primary:/data/db
    networks:
      - sbmi-net
    restart: always

networks:
  sbmi-net:
    driver: bridge

volumes:
  redis-data:
  mongo-data-primary:
