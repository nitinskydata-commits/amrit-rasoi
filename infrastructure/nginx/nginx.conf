worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Backend node upstream load-balancing pool
    upstream api_servers {
        server backend-api-1:5000 max_fails=3 fail_timeout=10s;
        server backend-api-2:5000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirect global HTTP to HTTPS if SSL configured (optional default)
        # return 301 https://$host$request_uri;

        # ⚙️ Routing to backend REST APIs
        location /api/v1/ {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 📁 Static assets / Uploads mapping
        location /uploads/ {
            proxy_pass http://api_servers;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # 🌐 Storefront Web Application (Frontend Server)
        location / {
            proxy_pass http://frontend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 💼 Admin Control Center Portal
        location /admin/ {
            proxy_pass http://admin:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
